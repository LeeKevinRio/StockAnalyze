# Render Blueprint — one-click deploy of the backend API + a free Postgres DB.
# In Render: New → Blueprint → pick this repo. Then fill in the two LLM keys.
services:
  - type: web
    name: stockanalyze-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Allowed frontend origins: GitHub Pages + local dev.
      - key: CORS_ORIGINS
        value: https://leekevinrio.github.io,http://localhost:3000
      # Wired automatically from the database below.
      - key: DATABASE_URL
        fromDatabase:
          name: stockanalyze-db
          property: connectionString
      # Auth — Render generates a secure random secret for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      # Google OAuth client ID (public — used to verify ID tokens).
      - key: GOOGLE_CLIENT_ID
        value: "866981925343-hmb7lsgcedtajnsoo1apc3tmc0nu84fm.apps.googleusercontent.com"
      # Secrets — enter these in the Render dashboard (sync:false = not in git).
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: stockanalyze-db
    plan: free
    databaseName: stock_analyze
